        <h4 class="Heading4"><a name="requests_user_instructions_delet_5703"></a>Delete a request</h4>
        <p>This task enables an authorized user to delete a request. You can delete a request only if no documents have been released. </p>
        <ol start="1" class="ol_1">
            <li class="li_1" value="1"><a href="Find a request.htm#requests_user_instructions_find__8646" class="SecondaryLink">Find a request</a>.</li>
            <li class="li_1" value="2">At the <a href="../../Form descriptions/Request Information form.htm#requests_form_descriptions_reque_922"><span class="SecondaryLink">Request Information form</span></a>, click <span class="span_3" style="font-weight: bold;">Delete Request</span>.</li>
            <li class="li_1" value="3">At the confirmation prompt, click <span class="span_3"><b>Delete</b>.</span></li>
        </ol>
