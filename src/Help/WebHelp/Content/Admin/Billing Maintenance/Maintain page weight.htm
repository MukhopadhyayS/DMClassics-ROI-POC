        <h3 class="Heading3"><a name="admin_billing_maint_user_instruc_2763"></a><a name="_Toc393967966"></a>Maintain page weight</h3>
        <p>To update the number of pages per ounce to use when calculating the shipping weight for ROI requests, do the following:</p>
        <ol start="1" class="ol_1">
            <li class="li_1" value="1">Access the <a href="Page Weight form.htm#admin_billing_maint_form_descrip_2729"><span class="Hyperlink">Page Weight form</span></a>.</li>
            <li class="li_1" value="2">Enter the number of pages that equals an ounce. </li>
            <li class="li_1" value="3">Click <span class="span_4" style="font-weight: bold;">Save</span>.</li>
        </ol>
    </body>
