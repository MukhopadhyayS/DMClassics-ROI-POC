output.log.path=\server\default\var\config\com\mckesson\eig\output\output-logging.xml

#mpfw configuration
mpfw.logging.production.path=\server\default\deploy\portal.war\WEB-INF\classes\config\logging\log4j-production.properties
mpfw.logging.staging.path=\server\default\deploy\portal.war\WEB-INF\classes\config\logging\log4j-staging.properties
