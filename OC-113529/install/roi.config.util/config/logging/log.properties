# RollingFileAppender appender
log4j.appender.fileAppender=org.apache.log4j.RollingFileAppender
log4j.appender.fileAppender.layout=org.apache.log4j.PatternLayout
log4j.appender.fileAppender.MaxFileSize=20MB
log4j.appender.fileAppender.MaxBackupIndex=20
log4j.appender.fileAppender.File=log/roi.config.util.log
log4j.appender.fileAppender.layout.ConversionPattern=%d{DATE} | %t | %c{1} | %m%n

# use the RollingFileAppender appender and set the level to DEBUG.
log4j.rootLogger=DEBUG, fileAppender
log4j.logger.com.mckesson.eig.roi.config.util.ui.JBossServerConfigUI=DEBUG, fileAppender
log4j.logger.com.mckesson.eig.roi.config.util.ui.DBConnectionConfigUI=DEBUG, fileAppender
log4j.logger.com.mckesson.eig.roi.config.util.ui.HPFWServiceConfigUI=DEBUG, fileAppender
log4j.logger.com.mckesson.eig.roi.config.util.ui.ClientInstallerConfigUI=DEBUG, fileAppender

log4j.logger.com.mckesson.eig.roi.config.util.controller.ConfigurationControllerImpl=DEBUG, fileAppender
log4j.logger.com.mckesson.eig.roi.config.util.controller.ConfigurationValidatorImpl=DEBUG, fileAppender

log4j.logger.com.mckesson.eig.roi.config.util.api.ConfigProps=DEBUG, fileAppender
